name: selenium-login.yml

on:
  push:
    branches:
      - main

jobs:
  selenium_tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/CareFlow-Flutter/"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Selenium Dependencies
        working-directory: ./selenium_tests
        run: npm install

      - name: Serve Web Build locally for E2E Tests
        run: |
          npx serve -s build/web -p 50000 &
          sleep 5

      - name: Run Selenium E2E Tests
        working-directory: ./selenium_tests
        env:
          CI: true
        run: node test_e2e.js

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Upload Selenium Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-excel-report
          path: selenium_tests/*.xlsx

      - name: Upload Selenium Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-screenshots
          path: selenium_tests/screenshots/*

  appium_tests:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        working-directory: ./appium_tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Appium Mobile Python Tests
        working-directory: ./appium_tests
        run: python test_e2e_mobile.py

      - name: Upload Appium Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-mobile-excel-report
          path: appium_tests/*.xlsx

      - name: Upload Appium Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-mobile-screenshots
          path: appium_tests/screenshots/*

  deploy_pages:
    name: Deploy to GitHub Pages
    needs: selenium_tests
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./build/web

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  generate_report:
    name: Generate LifeLink Test Report
    needs: [selenium_tests, appium_tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Selenium Reports
        uses: actions/download-artifact@v4
        with:
          name: selenium-web-excel-report
          path: reports/selenium
        continue-on-error: true

      - name: Download Appium Reports
        uses: actions/download-artifact@v4
        with:
          name: appium-mobile-excel-report
          path: reports/appium
        continue-on-error: true

      - name: Generate LifeLink Test Report
        run: |
          echo "Generating Combined LifeLink Test Report..."
          # Placeholder for report generation script
          # You can add logic here to process the downloaded excel reports from ./reports/
