name: medicare_app

description: "A production-grade Hospital Management Flutter app."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0

  # State Management & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Notifications & Reminders
  flutter_local_notifications: ^19.3.0
  timezone: ^0.10.0

  # UI & Fonts
  google_fonts: ^6.3.0
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # File Handling
  file_picker: ^10.2.0
  open_file: ^3.5.10
  pdf: ^3.11.3

  # HTTP & Utilities
  http: ^1.5.0
  intl: ^0.20.2

  # Local Storage
  shared_preferences: ^2.5.3
  google_generative_ai: ^0.4.7
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  responsive_framework: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  firebase_core_platform_interface: ^6.0.3

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon.png"

  android_12:
    color: "#FFFFFF"
    image: "assets/icon.png"